<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok 灰度登录</title>
    <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="assets/vendor/fonts/inter/inter.css">
    <script src="assets/vendor/tailwind/tailwind.min.js"></script>
    <script>
    tailwind.config = {
        darkMode: 'class',
        theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } }
    }
    </script>
</head>
<body class="min-h-screen bg-neutral-950 text-neutral-100 font-sans">
    <main class="mx-auto flex min-h-screen w-full max-w-3xl flex-col px-5 py-8">
        <header class="mb-8 flex items-center justify-between gap-4">
            <div>
                <h1 class="text-2xl font-semibold tracking-normal">Grok 灰度登录</h1>
                <p class="mt-2 text-sm text-neutral-400">这里仅用于连接 xAI/Grok 账号，不会切换当前正式聊天后端。</p>
            </div>
            <a href="/chat" class="rounded-lg border border-white/10 px-3 py-2 text-sm text-neutral-300 hover:bg-white/10">
                返回控制台
            </a>
        </header>

        <section class="rounded-lg border border-white/10 bg-neutral-900 p-5">
            <div class="mb-5 flex flex-wrap items-center justify-between gap-3">
                <div>
                    <div class="text-sm text-neutral-400">登录状态</div>
                    <div id="status-line" class="mt-1 text-lg font-medium">读取中...</div>
                </div>
                <button id="refresh-btn" class="rounded-lg border border-white/10 px-3 py-2 text-sm hover:bg-white/10">
                    <i class="fas fa-rotate-right mr-2"></i>刷新
                </button>
            </div>
            <dl class="grid gap-3 text-sm sm:grid-cols-2">
                <div class="rounded-lg bg-neutral-950 p-3">
                    <dt class="text-neutral-500">Provider</dt>
                    <dd id="provider" class="mt-1 break-all text-neutral-200">-</dd>
                </div>
                <div class="rounded-lg bg-neutral-950 p-3">
                    <dt class="text-neutral-500">Base URL</dt>
                    <dd id="base-url" class="mt-1 break-all text-neutral-200">-</dd>
                </div>
                <div class="rounded-lg bg-neutral-950 p-3">
                    <dt class="text-neutral-500">Email</dt>
                    <dd id="email" class="mt-1 break-all text-neutral-200">-</dd>
                </div>
                <div class="rounded-lg bg-neutral-950 p-3">
                    <dt class="text-neutral-500">Expires</dt>
                    <dd id="expires-at" class="mt-1 break-all text-neutral-200">-</dd>
                </div>
            </dl>
        </section>

        <section class="mt-5 rounded-lg border border-white/10 bg-neutral-900 p-5">
            <div class="flex flex-wrap gap-3">
                <button id="login-btn" class="rounded-lg bg-emerald-500 px-4 py-2 text-sm font-medium text-white hover:bg-emerald-600">
                    <i class="fas fa-right-to-bracket mr-2"></i>开始 Grok 登录
                </button>
                <button id="poll-btn" class="rounded-lg border border-white/10 px-4 py-2 text-sm hover:bg-white/10">
                    <i class="fas fa-satellite-dish mr-2"></i>轮询登录结果
                </button>
                <button id="test-btn" class="rounded-lg border border-white/10 px-4 py-2 text-sm hover:bg-white/10">
                    <i class="fas fa-plug-circle-check mr-2"></i>检查凭据
                </button>
                <button id="logout-btn" class="rounded-lg border border-red-500/30 px-4 py-2 text-sm text-red-200 hover:bg-red-500/10">
                    <i class="fas fa-right-from-bracket mr-2"></i>退出 Grok
                </button>
            </div>

            <div id="login-box" class="mt-5 hidden rounded-lg bg-neutral-950 p-4">
                <div class="text-sm text-neutral-400">登录链接</div>
                <a id="authorize-url" class="mt-2 block break-all text-sm text-emerald-300 underline" target="_blank" rel="noopener noreferrer"></a>
                <div id="login-message" class="mt-3 text-sm text-amber-200"></div>
            </div>
        </section>

        <section class="mt-5 rounded-lg border border-white/10 bg-neutral-900 p-5">
            <label for="callback-url" class="text-sm font-medium">Manual paste callback URL</label>
            <textarea id="callback-url" rows="3" class="mt-2 w-full rounded-lg border border-white/10 bg-neutral-950 p-3 text-sm text-neutral-100 outline-none focus:border-emerald-500" placeholder="http://127.0.0.1:56121/callback?code=...&state=..."></textarea>
            <button id="manual-btn" class="mt-3 rounded-lg border border-white/10 px-4 py-2 text-sm hover:bg-white/10">
                <i class="fas fa-clipboard-check mr-2"></i>提交回调 URL
            </button>
        </section>

        <pre id="output" class="mt-5 min-h-24 whitespace-pre-wrap rounded-lg border border-white/10 bg-black p-4 text-xs text-neutral-300"></pre>
    </main>
    <script src="assets/js/grok.js"></script>
</body>
</html>
