version: '2.0'
services:
  chatgpt-on-wechat:
    build:
      context: ..
      dockerfile: docker/Dockerfile.latest
      args:
        INSTALL_KNOWLEDGE_BACKEND: 'true'
    environment:
      KNOWLEDGE_BACKEND_ENABLED: 'True'
      KNOWLEDGE_BACKEND_VECTOR_PROVIDER: 'qdrant'
      KNOWLEDGE_BACKEND_QDRANT_URL: 'http://qdrant:6333'
      KNOWLEDGE_BACKEND_ADMIN_API_ENABLED: 'True'
      KNOWLEDGE_BACKEND_PROVIDER_API_ENABLED: 'False'
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cowagent-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./data/knowledge/qdrant:/qdrant/storage
